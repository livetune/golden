name: 黄金价格监控

on:
  # 定时触发：每5分钟一次（UTC时间）
  schedule:
    - cron: '*/5 * * * *'
  
  # 手动触发（方便调试）
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 6    # 超时保护，防止超出下一次调度

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成配置文件
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: |
          cat > config/config.yaml << 'YAML_END'
          # API配置
          api:
            source: 上金所Au9999
            interval: 40
            timeout: 10
            retry_times: 3
            max_history: 500

          # 价格波动算法配置
          algorithm:
            threshold: 5
            cooldown: 600

          # 内存管理配置
          memory:
            gc_interval: 60
            max_task_errors: 10

          # 邮件配置（由 Secrets 注入）
          email:
            smtp_server: smtp.qq.com
            smtp_port: 465
            use_ssl: true
            sender: ${EMAIL_SENDER}
            password: ${EMAIL_PASSWORD}
            receivers:
              - ${EMAIL_RECEIVERS}
            timeout: 30
            retry_times: 2

          # 日志配置
          logging:
            level: INFO
            file: logs/app.log
            max_bytes: 10485760
            backup_count: 5
          YAML_END
          
          # 用环境变量替换占位符
          sed -i "s|\${EMAIL_SENDER}|${EMAIL_SENDER}|g" config/config.yaml
          sed -i "s|\${EMAIL_PASSWORD}|${EMAIL_PASSWORD}|g" config/config.yaml
          sed -i "s|\${EMAIL_RECEIVERS}|${EMAIL_RECEIVERS}|g" config/config.yaml

      - name: 创建日志目录
        run: mkdir -p logs

      - name: 运行监控（持续约5分钟）
        run: timeout 290 python main.py || true
        # timeout 290秒（约4分50秒），留10秒余量给下一次调度
